name: Build Windows App
on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - windows-latest
          # - macos-latest  # Need to set up secrets first

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Set Version
        shell: bash
        run: |
          VERSION=$(date +'%Y.%-m.%-d')
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            # Sanitize branch name: allow alpha and hyphens, others become underscores
            BRANCH_LABEL=$(echo ${GITHUB_REF_NAME} | sed 's/[^a-zA-Z0-9-]/_/g' | tr '[:upper:]' '[:lower:]')
            VERSION="${VERSION}-${BRANCH_LABEL}"
          fi
          echo "Setting version to: $VERSION"
          npm version $VERSION --no-git-tag-version

      - name: Build Electron App
        run: npm run make

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: out/make/**/*
