name: Build
on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases?'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - windows-latest
          #- macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Set Version
        shell: bash
        run: |
          VERSION=$(date +'%Y.%-m.%-d')
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            # Sanitize branch name: replace all non-alphanumeric with hyphens
            # Squirrel for Windows limits the 'special version' part to 20 characters.
            BRANCH_LABEL=$(echo ${GITHUB_REF_NAME} | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | cut -c 1-20 | sed 's/-*$//')
            VERSION="${VERSION}-${BRANCH_LABEL}"
          fi
          echo "Setting version to: $VERSION"
          npm version $VERSION --no-git-tag-version

      - name: Build Electron App
        run: npm run make

      - name: Publish Electron App
        if: github.event_name == 'workflow_dispatch' && inputs.publish == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: out/make/**/*
